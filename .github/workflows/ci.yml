name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LifeInsuranceCRM.slnx

      - name: Build
        run: dotnet build LifeInsuranceCRM.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test LifeInsuranceCRM.slnx
          --no-build
          --configuration Release
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool restore

      - name: Generate coverage report
        run: >
          dotnet reportgenerator
          "-reports:TestResults/**/coverage.cobertura.xml"
          "-targetdir:CodeCoverage/report"
          "-reporttypes:Html;Cobertura;TextSummary"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: src/CodeCoverage/report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/TestResults
